name: CI (main)

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: setup rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - run: cargo install mdbook-toc
      - run: cargo install mdbook-katex --version 0.10.0-alpha
      - uses: taiki-e/install-action@mdbook

      - name: patch for gh-pages build
        run: |
          if [ -f book/theme/head.hbs._ ]; then
            mv book/theme/head.hbs._ book/theme/head.hbs
          fi

      - name: build book
        run: cd book && mdbook build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-22.04

    if: github.repository == 'mmcs-work/tiny-llm'

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4